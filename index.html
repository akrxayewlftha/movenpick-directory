<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Room Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c211d;--ink-2:#103029;
  --gold:#bda067;--gold-soft:#d7c193;--gold-deep:#9b8350;
  --ivory:#f3ecdd;--ivory-dim:rgba(243,236,221,.60);--ivory-faint:rgba(243,236,221,.34);
  --line:rgba(189,160,103,.26);
  --ease:cubic-bezier(.22,.61,.21,1);
  --pop:cubic-bezier(.16,.84,.30,1);
  --spring:cubic-bezier(.34,1.46,.5,1);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--ivory);font-family:var(--sans);font-weight:300;letter-spacing:.01em;position:relative}

.amb{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.amb::before{content:"";position:absolute;top:-18%;left:50%;transform:translateX(-50%);
  width:120vh;height:120vh;border-radius:50%;
  background:radial-gradient(circle,rgba(215,193,147,.14),rgba(215,193,147,.03) 42%,transparent 64%);
  animation:breathe 9s var(--ease) infinite alternate}
@keyframes breathe{from{opacity:.55}to{opacity:1;transform:translateX(-50%) scale(1.06)}}

#app{position:fixed;inset:0;z-index:2}
header.bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:clamp(14px,2.4vh,24px) clamp(20px,4vw,56px) clamp(26px,4vh,42px);pointer-events:none;
  background:linear-gradient(180deg,rgba(8,20,17,.85) 0%,rgba(8,20,17,.5) 48%,rgba(8,20,17,0) 100%)}
header.bar::after{content:"";position:absolute;left:clamp(20px,4vw,56px);right:clamp(20px,4vw,56px);
  bottom:clamp(14px,2.2vh,22px);height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);opacity:.7}
.brand,.bar-right{pointer-events:auto}
.brand{display:flex;align-items:center;gap:18px;cursor:pointer;border:none;background:none;color:inherit}
.brand img{height:clamp(40px,6.4vh,58px);width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5))}
.bar-right{text-align:right;line-height:1.25}
.clock{font-family:var(--serif);font-size:clamp(20px,3.1vh,30px);letter-spacing:.04em;color:var(--gold-soft)}
.bar-date{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--ivory-dim);margin-top:2px}

/* ---- reactive 3D window transitions ---- */
.stage{position:absolute;inset:0;perspective:1500px;perspective-origin:50% 45%;transform-style:preserve-3d}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:clamp(78px,11vh,108px) clamp(20px,4vw,56px) clamp(16px,2.4vh,30px);
  opacity:0;backface-visibility:hidden;transform-origin:center;transform-style:preserve-3d;
  transition:opacity .5s var(--ease),transform .72s var(--spring),filter .5s var(--ease);will-change:opacity,transform}
.screen.enter-fwd{opacity:0;transform:translate3d(16%,0,-420px) rotateY(-26deg) scale(.88);filter:blur(9px)}
.screen.enter-back{opacity:0;transform:translate3d(-16%,0,-420px) rotateY(26deg) scale(.88);filter:blur(9px)}
.screen.is-active{opacity:1;transform:translate3d(0,0,0) rotateY(0) scale(1);filter:none}
.screen.leave-fwd{opacity:0;transform:translate3d(-12%,0,240px) rotateY(20deg) scale(.9);filter:blur(8px);
  transition:opacity .34s var(--ease),transform .4s var(--ease),filter .3s var(--ease)}
.screen.leave-back{opacity:0;transform:translate3d(12%,0,240px) rotateY(-20deg) scale(.9);filter:blur(8px);
  transition:opacity .34s var(--ease),transform .4s var(--ease),filter .3s var(--ease)}

.scene{position:absolute;inset:0;z-index:0;overflow:hidden}
.scene svg{position:absolute;inset:0;width:100%;height:100%}
.scene .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.scene-veil{position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(90deg,rgba(8,20,17,.92) 0%,rgba(8,20,17,.72) 46%,rgba(8,20,17,.4) 100%),
             linear-gradient(0deg,rgba(8,20,17,.96) 2%,rgba(8,20,17,.1) 58%)}
.home .scene-veil{background:radial-gradient(120% 100% at 50% 40%,rgba(8,20,17,.4),rgba(8,20,17,.84) 86%),
             linear-gradient(0deg,rgba(8,20,17,.96),rgba(8,20,17,.18) 60%)}
.screen>*:not(.scene):not(.scene-veil){position:relative;z-index:3}

.shine{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden}
.shine::before{content:"";position:absolute;top:-30%;left:-60%;width:42%;height:160%;transform:rotate(18deg);
  background:linear-gradient(90deg,transparent,rgba(247,233,196,.14),rgba(255,255,255,.26),rgba(247,233,196,.14),transparent);
  mix-blend-mode:screen;filter:blur(5px);animation:sweep 1.4s var(--ease) .15s both}
@keyframes sweep{from{left:-60%}to{left:140%}}

.sheen{background:linear-gradient(100deg,#f1e8d4 18%,#f8ead0 34%,#e8cf94 50%,#f8ead0 66%,#f1e8d4 82%);
  background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:sheen 7s linear infinite}
@keyframes sheen{to{background-position:-220% center}}
@keyframes riseIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* HOME ---------------------------------------------------------------------*/
.home{justify-content:center;align-items:center;text-align:center}
.emblem-fly{height:clamp(30px,5vh,46px);margin-bottom:clamp(6px,1.2vh,14px);filter:drop-shadow(0 6px 14px rgba(0,0,0,.45)) brightness(1.05);
  transform-origin:50% 60%;animation:emblemFly 3.6s var(--ease) infinite}
@keyframes emblemFly{0%,100%{transform:translateY(0) scaleY(1) rotate(0)}25%{transform:translateY(-11px) scaleY(.8) rotate(-1.4deg)}
  50%{transform:translateY(-3px) scaleY(1.05)}75%{transform:translateY(-11px) scaleY(.82) rotate(1.4deg)}}
.home-kicker{font-size:12px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:clamp(4px,.9vh,10px);animation:riseIn .9s var(--ease) .1s both}
.home h1{font-family:var(--serif);font-weight:500;line-height:1;font-size:clamp(34px,7vh,68px);letter-spacing:.01em;animation:riseIn 1s var(--ease) .18s both}
.home h1 em{font-style:italic}
.home-sub{font-size:clamp(11px,1.6vh,14px);letter-spacing:.18em;color:var(--ivory-dim);text-transform:uppercase;margin-top:clamp(6px,1.2vh,12px);animation:riseIn 1s var(--ease) .26s both}
.rule{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:clamp(10px,2vh,20px) auto;animation:growRule 1.1s var(--ease) .36s both}
@keyframes growRule{from{width:0;opacity:0}to{width:60px;opacity:1}}

.grid{display:grid;gap:clamp(11px,1.4vw,20px);width:min(1200px,95vw);grid-template-columns:repeat(5,1fr);perspective:1100px;perspective-origin:50% 40%}

/* IMAGE-CARD BLOCKS (deep 3D) ----------------------------------------------*/
.tile{position:relative;display:flex;flex-direction:column;cursor:pointer;color:inherit;text-align:left;
  border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(13,34,29,.6);
  box-shadow:0 10px 30px -20px rgba(0,0,0,.8);transform-style:preserve-3d;
  transition:transform .18s var(--ease),border-color .5s var(--ease),box-shadow .5s var(--ease);
  animation:cardIn .75s var(--spring) both}
@keyframes cardIn{from{opacity:0;transform:translateY(34px) rotateX(14deg) scale(.94)}to{opacity:1;transform:none}}
/* entrée d'accueil : rangées du haut depuis la droite, du bas depuis la gauche */
@keyframes tileFromRight{from{opacity:0;transform:translateX(85px) scale(.95)}to{opacity:1;transform:none}}
@keyframes tileFromLeft{from{opacity:0;transform:translateX(-85px) scale(.95)}to{opacity:1;transform:none}}
.tile.from-right{animation-name:tileFromRight}
.tile.from-left{animation-name:tileFromLeft}
.tile-img{position:relative;height:clamp(62px,10.5vh,118px);overflow:hidden;transform:translateZ(0)}
.tile-img svg{width:100%;height:100%;display:block;transition:transform .8s var(--ease)}
.tile-img .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:transform .8s var(--ease)}
.tile-img::after{content:"";position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,transparent 35%,rgba(13,34,29,.45) 75%,rgba(13,34,29,.95))}
.tile-badge{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;z-index:4;
  display:flex;align-items:center;justify-content:center;background:rgba(12,33,29,.55);border:1px solid var(--line);
  backdrop-filter:blur(4px);transition:background .5s var(--pop),border-color .5s var(--pop),transform .45s var(--spring)}
.tile-badge svg{width:18px;height:18px;stroke:var(--gold-soft);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tile-body{position:relative;z-index:3;display:flex;flex-direction:column;gap:2px;padding:clamp(9px,1.5vh,15px) clamp(11px,1.4vw,16px) clamp(11px,1.7vh,16px);
  transition:transform .45s var(--spring)}
.tile-num{font-family:var(--serif);font-size:12px;color:var(--gold);letter-spacing:.12em}
.tile h3{font-family:var(--serif);font-weight:500;font-size:clamp(16px,2.3vh,21px);line-height:1.08}
.tile .en{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ivory-faint)}
.tile-glare{position:absolute;inset:0;z-index:5;pointer-events:none;border-radius:18px;opacity:0;transition:opacity .4s var(--ease);
  background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,247,224,.34),transparent 46%);mix-blend-mode:screen}
.tile-edge{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:18px;box-shadow:inset 0 0 0 1px transparent;transition:box-shadow .5s var(--ease)}
.tile:hover,.tile:focus-visible{border-color:var(--gold);outline:none;box-shadow:0 30px 60px -26px rgba(0,0,0,.95)}
.tile:hover .tile-glare,.tile:focus-visible .tile-glare{opacity:1}
.tile:hover .tile-img svg,.tile:hover .tile-img .photo,.tile:focus-visible .tile-img svg,.tile:focus-visible .tile-img .photo{transform:scale(1.12)}
.tile:hover .tile-badge,.tile:focus-visible .tile-badge{background:var(--gold);border-color:var(--gold);transform:translateZ(60px) scale(1.06)}
.tile:hover .tile-badge svg,.tile:focus-visible .tile-badge svg{stroke:var(--ink)}
.tile:hover .tile-body,.tile:focus-visible .tile-body{transform:translateZ(38px)}
.tile:hover .tile-edge,.tile:focus-visible .tile-edge{box-shadow:inset 0 0 0 1px rgba(215,193,147,.5),0 0 26px -4px rgba(189,160,103,.45)}

/* CATEGORY -----------------------------------------------------------------*/
.cat-head{flex:0 0 auto;display:flex;align-items:center;gap:18px;padding:clamp(4px,1vh,10px) 0 clamp(12px,2vh,20px);animation:riseIn .7s var(--ease) .1s both}
.back{display:flex;align-items:center;justify-content:center;width:46px;height:46px;flex:0 0 auto;
  border:1px solid var(--line);border-radius:50%;background:rgba(21,67,58,.5);color:var(--gold-soft);cursor:pointer;transition:all .35s var(--ease)}
.back:hover,.back:focus-visible{background:var(--gold);color:var(--ink);border-color:var(--gold);outline:none;transform:translateX(-3px)}
.back svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cat-head .titles .ovr{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold)}
.cat-head .titles h2{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4.6vh,44px);line-height:1.04}

.split{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:minmax(248px,330px) 1fr;gap:clamp(18px,3vw,46px);perspective:1300px}
.list{min-height:0;overflow-y:auto;padding-right:8px;display:flex;flex-direction:column;gap:6px;
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 12px,#000 calc(100% - 16px),transparent);mask-image:linear-gradient(180deg,transparent,#000 12px,#000 calc(100% - 16px),transparent)}
.list::-webkit-scrollbar{width:3px}.list::-webkit-scrollbar-thumb{background:var(--gold-deep);border-radius:3px}
.li{display:block;width:100%;text-align:left;cursor:pointer;color:inherit;border:1px solid transparent;border-radius:12px;
  background:rgba(16,48,41,.32);padding:clamp(9px,1.4vh,13px) 15px;transition:all .4s var(--pop);animation:slideIn .55s var(--pop) both}
@keyframes slideIn{from{opacity:0;transform:translateX(-18px) rotateY(-10deg)}to{opacity:1;transform:none}}
.li .li-name{font-family:var(--serif);font-size:clamp(16px,2.3vh,21px);font-weight:500;line-height:1.12;color:var(--ivory-dim);transition:color .35s var(--ease)}
.li .li-tag{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ivory-faint);margin-top:3px}
.li:hover{border-color:var(--line);background:rgba(21,67,58,.45);transform:translateX(4px)}
.li:hover .li-name{color:var(--ivory)}
.li.on{border-color:var(--gold);background:linear-gradient(90deg,rgba(189,160,103,.18),rgba(21,67,58,.3));box-shadow:0 0 22px -8px rgba(189,160,103,.5)}
.li.on .li-name{color:var(--gold-soft)}

.detail{min-height:0;display:flex;flex-direction:column;justify-content:center;position:relative;perspective:1200px}
.d-card{position:relative;border:1px solid var(--line);border-radius:20px;overflow:hidden;transform-style:preserve-3d;
  background:linear-gradient(155deg,rgba(21,67,58,.42),rgba(13,34,29,.5));box-shadow:0 24px 60px -34px rgba(0,0,0,.9);backdrop-filter:blur(3px);
  transition:transform .2s var(--ease),box-shadow .5s var(--ease)}
.d-hero{height:clamp(96px,18vh,200px);position:relative;overflow:hidden}
.d-hero svg,.d-hero .photo{width:100%;height:100%;display:block;object-fit:cover;transition:transform 1.2s var(--ease)}
.d-hero .photo{position:absolute;inset:0;z-index:1}
.d-card:hover .d-hero svg,.d-card:hover .d-hero .photo{transform:scale(1.07)}
.d-hero::after{content:"";position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,transparent 30%,rgba(13,34,29,.55) 70%,rgba(15,40,34,.96))}
.d-glare{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;transition:opacity .4s var(--ease);
  background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,247,224,.18),transparent 48%);mix-blend-mode:screen}
.d-card:hover .d-glare{opacity:1}
.d-body{position:relative;z-index:4;padding:clamp(16px,2.6vh,30px) clamp(18px,2.6vw,38px) clamp(18px,2.8vh,32px);transform:translateZ(30px)}
.detail-inner{opacity:0}
.detail-inner.show .d-tag{animation:riseIn .5s var(--ease) .04s both}
.detail-inner.show .d-card{animation:cardIn3d .6s var(--spring) both}
@keyframes cardIn3d{from{opacity:0;transform:translateY(22px) rotateX(12deg) scale(.95)}to{opacity:1;transform:none}}
.detail-inner.show{opacity:1}
.d-tag{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.detail h3{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4.6vh,46px);line-height:1.04;margin-bottom:clamp(10px,1.8vh,18px)}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:clamp(12px,2vh,20px)}
.chip{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-soft);border:1px solid var(--line);border-radius:999px;
  padding:6px 14px;background:rgba(21,67,58,.5);animation:popChip .5s var(--spring) both}
@keyframes popChip{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:none}}
.detail p{font-family:var(--serif);font-size:clamp(15px,2.35vh,21px);line-height:1.6;color:rgba(243,236,221,.88);
  max-width:62ch;max-height:22vh;overflow-y:auto;padding-right:6px}
.detail p::-webkit-scrollbar{width:3px}.detail p::-webkit-scrollbar-thumb{background:var(--gold-deep);border-radius:3px}

.hint{flex:0 0 auto;text-align:center;font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ivory-faint);padding-top:clamp(8px,1.4vh,14px)}
.hint b{color:var(--gold-soft);font-weight:400}

/* ---- language switch ---- */
.lang-switch{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-bottom:5px}
.ls-cur{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);font-weight:500;border:1px solid var(--gold);padding:3px 9px;border-radius:999px}
.ls-sep{color:var(--line);font-size:10px}
.ls-lnk{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--ivory-dim);text-decoration:none;border:1px solid transparent;padding:3px 9px;border-radius:999px;transition:all .3s var(--ease)}
.ls-lnk:hover{color:var(--gold);border-color:var(--line)}

@media (max-width:1080px){ .grid{grid-template-columns:repeat(4,1fr)} }
@media (max-width:820px){
  .grid{grid-template-columns:repeat(3,1fr)}
  /* mobile : empilement naturel (liste de sous-blocs puis fiche) qui défile */
  .split{display:flex;flex-direction:column;flex:0 0 auto;min-height:auto;gap:16px}
  .detail{border-left:none;padding-left:0;justify-content:flex-start}
  .list{max-height:34vh;flex-direction:row;overflow-x:auto;mask-image:none;-webkit-mask-image:none}
  .li{min-width:200px}
  /* les blocs dépassent l'écran -> on autorise le défilement vertical */
  .screen{overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .home{justify-content:flex-start;padding-bottom:34px}
  .detail p{max-height:none}
}
@media (max-width:560px){
  .grid{grid-template-columns:repeat(2,1fr)}
  header.bar{padding:12px 16px 22px}
  .bar-date{letter-spacing:.18em}
  .screen{padding-top:clamp(70px,16vw,96px)}
}
@media (prefers-reduced-motion:reduce){ *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.14s !important;filter:none !important} }

/* ---- WhatsApp : actions par sous-bloc + fenêtre de réservation ---- */
.d-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:clamp(12px,2vh,18px)}
.wa-btn{display:inline-flex;align-items:center;gap:8px;font:inherit;font-size:13px;letter-spacing:.04em;cursor:pointer;
  border-radius:999px;padding:9px 16px;border:1px solid var(--gold);background:transparent;color:var(--gold);transition:all .3s var(--ease)}
.wa-btn:hover{background:var(--gold);color:var(--ink)}
.wa-btn svg{width:16px;height:16px;fill:currentColor;flex:0 0 auto}
.wa-btn.book{background:#25d366;border-color:#25d366;color:#06281a}
.wa-btn.book:hover{background:#1ebe5b;border-color:#1ebe5b;color:#06281a}
.wa-modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(6,16,13,.74);backdrop-filter:blur(5px)}
.wa-modal.open{display:flex;animation:waFade .25s var(--ease)}
@keyframes waFade{from{opacity:0}to{opacity:1}}
.wa-box{width:min(420px,92vw);background:linear-gradient(155deg,var(--ink-2),var(--ink));border:1px solid var(--line);
  border-radius:18px;padding:clamp(20px,3vw,30px);box-shadow:0 30px 80px -30px #000;animation:cardIn3d .4s var(--spring)}
.wa-box h4{font-family:var(--serif);font-weight:500;font-size:23px;color:var(--gold-soft);margin:0 0 2px}
.wa-box .wa-item{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:18px}
.wa-field{margin-bottom:13px}
.wa-field label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:6px}
.wa-field input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.28);
  color:var(--ivory);font:inherit}
.wa-field input:focus{outline:none;border-color:var(--gold)}
.wa-row{display:flex;gap:10px}.wa-row .wa-field{flex:1}
.wa-acts{display:flex;gap:10px;margin-top:20px}
.wa-acts button{flex:1;font:inherit;cursor:pointer;border-radius:999px;padding:11px;letter-spacing:.04em;transition:all .3s var(--ease)}
.wa-cancel{background:transparent;border:1px solid var(--line);color:var(--ivory-dim)}
.wa-cancel:hover{border-color:var(--ivory-dim);color:var(--ivory)}
.wa-send{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#25d366;border:1px solid #25d366;color:#06281a}
.wa-send:hover{background:#1ebe5b}.wa-send svg{width:16px;height:16px;fill:currentColor}
</style>
</head>
<body>
<div class="amb" aria-hidden="true"></div>
<div id="app">
  <header class="bar">
    <button class="brand" id="brand" aria-label="Retour à l'accueil">
      <img src="assets/logo.png" alt="" id="brandLogo" />
    </button>
    <div class="bar-right">
      <div class="lang-switch">
        <span class="ls-cur">FR</span>
        <span class="ls-sep">|</span>
        <a class="ls-lnk" href="en/index.html">EN</a>
      </div>
      <div class="clock" id="clock">--:--</div>
      <div class="bar-date" id="date">MARRAKECH</div>
    </div>
  </header>
  <main class="stage" id="stage" aria-live="polite"></main>
</div>

<script src="data.js?v=3"></script>
<script src="supabase-config.js"></script>
<script src="photos-db.js"></script>
<script>
(function(){
  const stage=document.getElementById('stage'), D=DIRECTORY;

  /* ---- charte de couleurs pilotée par data.js (D.theme) --------------------
     4 couleurs (ink, ink2, gold, ivory) suffisent : on dérive les variantes.  */
  (function applyTheme(t){
    if(!t) return;
    const root=document.documentElement.style;
    const rgb=h=>{h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
      return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
    const ok=h=>/^#?[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(h||'');
    const rgba=(h,a)=>{const[r,g,b]=rgb(h);return `rgba(${r},${g},${b},${a})`;};
    const mix=(h,f)=>{const[r,g,b]=rgb(h),t=f>0?255:0,a=Math.abs(f),
      hx=v=>Math.round(v+(t-v)*a).toString(16).padStart(2,'0');return '#'+hx(r)+hx(g)+hx(b);};
    const set=(k,v)=>{if(v)root.setProperty(k,v);};
    if(ok(t.ink)){ set('--ink',t.ink); set('--ink-2', ok(t.ink2)?t.ink2:mix(t.ink,.18)); }
    if(ok(t.gold)){
      set('--gold',t.gold);
      set('--gold-soft', ok(t.goldSoft)?t.goldSoft:mix(t.gold,.30));
      set('--gold-deep', ok(t.goldDeep)?t.goldDeep:mix(t.gold,-.22));
      set('--line', rgba(t.gold,.26));
    }
    if(ok(t.ivory)){
      set('--ivory',t.ivory);
      set('--ivory-dim', rgba(t.ivory,.60));
      set('--ivory-faint', rgba(t.ivory,.34));
    }
  })(D.theme);

  /* libellés pilotés par les données (génériques pour tout hôtel) */
  document.title=(D.hotel?D.hotel+' — ':'')+'Room Directory';
  const _logo=document.getElementById('brandLogo'); if(_logo){_logo.alt=D.hotel||'';}
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  const elClock=document.getElementById('clock'), elDate=document.getElementById('date');
  const fmtDate=new Intl.DateTimeFormat('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  function tick(){const n=new Date();
    elClock.textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    elDate.textContent=(fmtDate.format(n)+' · '+D.city).toUpperCase();}
  tick();setInterval(tick,1000);

  const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const chips=arr=>(arr&&arr.length)?'<div class="chips">'+arr.map((c,i)=>'<span class="chip" style="animation-delay:'+(0.22+i*0.07)+'s">'+esc(c)+'</span>').join('')+'</div>':'';
  /* real photo with DB override -> local file -> SVG illustration.
     window.PHOTO_DB (pid->url) est rempli par photos-db.js depuis Supabase.   */
  const dbURL=pid=>(window.PHOTO_DB&&window.PHOTO_DB[pid])||null;
  const imgTag=(pid,local)=>`<img class="photo" src="${dbURL(pid)||local}" alt="" onerror="this.remove()">`;
  const photo=id=>imgTag(id,`assets/img/${id}.jpg`);
  const catPhoto=c=>c.pid?imgTag(c.pid,`assets/img/items/${c.pid}.jpg`):photo(c.id);

  /* ---- generated SVG illustration per block ---- */
  const SCENES={
    home:{a:'#1c4338',b:'#0c211d',sun:'#e9cf94',sx:50,motif:'arches'},
    bienvenue:{a:'#26503f',b:'#0c211d',sun:'#eed6a0',sx:60,motif:'arches'},
    restaurants:{a:'#46341f',b:'#0e1f1b',sun:'#f0b675',sx:70,motif:'olive'},
    spa:{a:'#16433f',b:'#0a1f1e',sun:'#cfe3d4',sx:32,motif:'water'},
    kids:{a:'#2f5056',b:'#0c211d',sun:'#f0c98a',sx:66,motif:'palms'},
    loisirs:{a:'#155553',b:'#0a201f',sun:'#bfe6df',sx:40,motif:'water'},
    outdoors:{a:'#653f2c',b:'#10211c',sun:'#f3c07e',sx:26,motif:'mountains'},
    ville:{a:'#6a4026',b:'#11201a',sun:'#f4a85e',sx:72,motif:'medina'},
    services:{a:'#244a3b',b:'#0c211d',sun:'#e3cd97',sx:50,motif:'arches'},
    comm:{a:'#174443',b:'#0a1e1d',sun:'#bfe0d8',sx:58,motif:'water'},
    urgence:{a:'#1f3f37',b:'#091a17',sun:'#c9d8c4',sx:32,motif:'mountains'}
  };
  function motif(t){switch(t){
    case 'mountains':return `<path d="M0 150 L70 95 L120 125 L185 80 L255 125 L330 90 L400 120 L400 220 L0 220Z" fill="rgba(6,18,16,.5)"/><path d="M0 170 L90 120 L160 155 L240 115 L320 150 L400 120 L400 220 L0 220Z" fill="rgba(5,15,13,.74)"/>`;
    case 'medina':return `<g fill="rgba(6,17,14,.7)"><rect x="30" y="135" width="40" height="85"/><rect x="80" y="150" width="30" height="70"/><rect x="180" y="130" width="34" height="90"/><rect x="250" y="150" width="46" height="70"/><rect x="320" y="135" width="40" height="85"/><rect x="125" y="80" width="22" height="140"/><path d="M125 80 q11 -16 22 0Z"/><circle cx="240" cy="138" r="10"/><circle cx="305" cy="150" r="8"/></g>`;
    case 'palms':return `${palm(70,220,.62)}${palm(340,220,.74)}<path d="M0 185 Q200 168 400 188 L400 220 L0 220Z" fill="rgba(6,18,15,.72)"/>`;
    case 'olive':return `<g fill="rgba(6,17,14,.72)"><rect x="192" y="135" width="9" height="80"/><ellipse cx="196" cy="120" rx="64" ry="36"/></g><path d="M0 190 Q200 174 400 192 L400 220 L0 220Z" fill="rgba(6,18,15,.74)"/>`;
    case 'water':return `<path d="M0 168 Q200 156 400 168 L400 220 L0 220Z" fill="rgba(40,120,120,.2)"/><g stroke="rgba(207,227,212,.2)" stroke-width="1.6" fill="none"><path d="M30 186 q40 -7 80 0 t80 0 t80 0 t80 0 t80 0"/><path d="M10 202 q40 7 80 0 t80 0 t80 0 t80 0 t80 0"/></g><path d="M0 210 Q200 198 400 210 L400 220 L0 220Z" fill="rgba(6,18,17,.6)"/>`;
    default:return `<g fill="none" stroke="rgba(189,160,103,.26)" stroke-width="2.4">${[70,170,270,360].map(x=>`<path d="M${x-32} 220 L${x-32} 150 Q${x} 116 ${x+32} 150 L${x+32} 220"/>`).join('')}</g><path d="M0 214 Q200 205 400 214 L400 220 L0 220Z" fill="rgba(6,18,15,.55)"/>`;}}
  function palm(x,y,s){return `<g transform="translate(${x} ${y}) scale(${s})" fill="rgba(6,18,15,.72)"><path d="M-4 0 L-1.5 -150 L1.5 -150 L4 0Z"/><g stroke="rgba(6,18,15,.72)" stroke-width="7" fill="none" stroke-linecap="round"><path d="M0 -150 q-52 -20 -104 4"/><path d="M0 -150 q52 -20 104 4"/><path d="M0 -150 q-32 -48 -90 -48"/><path d="M0 -150 q32 -48 90 -48"/><path d="M0 -150 q-8 -52 -22 -90"/><path d="M0 -150 q8 -52 22 -90"/></g></g>`;}
  function illus(key){const c=SCENES[key]||SCENES.home;return `<svg viewBox="0 0 400 220" preserveAspectRatio="xMidYMid slice" aria-hidden="true"><defs><linearGradient id="g_${key}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c.a}"/><stop offset="1" stop-color="${c.b}"/></linearGradient><radialGradient id="s_${key}" cx="${c.sx}%" cy="34%" r="46%"><stop offset="0" stop-color="${c.sun}" stop-opacity=".95"/><stop offset="26%" stop-color="${c.sun}" stop-opacity=".34"/><stop offset="62%" stop-color="${c.sun}" stop-opacity="0"/></radialGradient></defs><rect width="400" height="220" fill="url(#g_${key})"/><rect width="400" height="220" fill="url(#s_${key})"/><circle cx="${c.sx/100*400}" cy="74" r="17" fill="${c.sun}" opacity=".55"/>${motif(c.motif)}</svg>`;}

  /* ---- pointer-driven 3D tilt ---- */
  function tilt(el,max){
    if(reduce)return;
    el.addEventListener('pointermove',e=>{
      const r=el.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width-.5, py=(e.clientY-r.top)/r.height-.5;
      el.style.transform=`translateY(-7px) rotateX(${(-py*max).toFixed(2)}deg) rotateY(${(px*max).toFixed(2)}deg)`;
      el.style.setProperty('--gx',((px+.5)*100).toFixed(1)+'%');
      el.style.setProperty('--gy',((py+.5)*100).toFixed(1)+'%');
    });
    el.addEventListener('pointerleave',()=>{el.style.transform='';});
  }

  /* ---- transitions ---- */
  function mount(node,dir){
    const prev=stage.querySelector('.screen.is-active');
    if(prev){prev.classList.remove('is-active');prev.classList.add(dir==='back'?'leave-back':'leave-fwd');setTimeout(()=>prev.remove(),460);}
    node.classList.add('screen',dir==='back'?'enter-back':'enter-fwd');
    stage.appendChild(node);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{node.classList.remove('enter-fwd','enter-back');node.classList.add('is-active');}));
  }

  /* ---- HOME ---- */
  function home(dir){
    const s=document.createElement('section');s.className='home';
    const cols=(innerWidth<=560?2:innerWidth<=820?3:innerWidth<=1080?4:5);
    const tiles=D.categories.map((c,i)=>`
      <button class="tile ${Math.floor(i/cols)%2?'from-left':'from-right'}" data-cat="${c.id}" style="animation-delay:${(0.2+(i%cols)*0.08).toFixed(2)}s" aria-label="${esc(c.title)}">
        <div class="tile-img">${illus(c.id)}${catPhoto(c)}<span class="tile-badge"><svg viewBox="0 0 24 24">${ICONS[c.icon]||''}</svg></span></div>
        <div class="tile-body"><span class="tile-num">${String(i+1).padStart(2,'0')}</span><h3>${esc(c.title)}</h3><span class="en">${esc(c.en)}</span></div>
        <span class="tile-glare"></span><span class="tile-edge"></span></button>`).join('');
    s.innerHTML=`<div class="scene">${illus('home')}${catPhoto(D.categories.find(c=>c.id==='bienvenue')||{id:'bienvenue'})}</div><div class="scene-veil"></div><div class="shine"></div>
      <img class="emblem-fly" src="assets/emblem.png" alt="" aria-hidden="true" />
      <div class="home-kicker">${esc((D.home&&D.home.kicker)||'Room Directory')}</div>
      <h1>${esc((D.home&&D.home.title)||'Bienvenue')} <em class="sheen">${esc((D.home&&D.home.amp)||'&')}</em> ${esc((D.home&&D.home.title2)||'Marhaba')}</h1>
      <div class="home-sub">${esc(D.hotel)} · ${esc(D.city)}</div><div class="rule"></div>
      <div class="grid">${tiles}</div>`;
    s.querySelectorAll('.tile').forEach(b=>{b.addEventListener('click',()=>category(b.dataset.cat,'fwd'));tilt(b,12);});
    mount(s,dir||'back');
  }

  /* ---- CATEGORY ---- */
  function category(id,dir){
    const cat=D.categories.find(c=>c.id===id);if(!cat)return home('back');
    const s=document.createElement('section');
    const lis=cat.items.map((it,i)=>`<button class="li${i===0?' on':''}" data-i="${i}" style="animation-delay:${0.16+i*0.05}s">
        <div class="li-name">${esc(it.name)}</div>${it.tagline?`<div class="li-tag">${esc(it.tagline)}</div>`:''}</button>`).join('');
    s.innerHTML=`<div class="scene">${illus(id)}${catPhoto(cat)}</div><div class="scene-veil"></div><div class="shine"></div>
      <div class="cat-head"><button class="back" aria-label="Retour"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></button>
        <div class="titles"><div class="ovr">${esc(cat.en)}</div><h2 class="sheen">${esc(cat.title)}</h2></div></div>
      <div class="split"><div class="list" role="tablist">${lis}</div>
        <div class="detail"><div class="detail-inner" id="dinner"></div></div></div>
      <div class="hint">Touchez un élément pour en savoir plus · <b>Esc</b> pour revenir</div>`;
    const inner=s.querySelector('#dinner'), listEl=s.querySelector('.list');
    function show(i){
      const it=cat.items[i];
      const heroPhoto=it.pid?imgTag(it.pid,`assets/img/items/${it.pid}.jpg`):photo(id);
      inner.classList.remove('show');void inner.offsetWidth;
      inner.innerHTML=`<div class="d-card"><div class="d-hero">${illus(id)}${heroPhoto}<span class="d-glare"></span></div>
        <div class="d-body">${it.tagline?`<div class="d-tag">${esc(it.tagline)}</div>`:''}<h3 class="sheen">${esc(it.name)}</h3>${chips(it.chips)}<p>${esc(it.body)}</p>${waActions(id)}</div></div>`;
      requestAnimationFrame(()=>inner.classList.add('show'));
      const card=inner.querySelector('.d-card'); if(card)tilt(card,6);
      waBind(inner,it);
      listEl.querySelectorAll('.li').forEach(b=>b.classList.toggle('on',+b.dataset.i===i));
    }
    listEl.querySelectorAll('.li').forEach(b=>b.addEventListener('click',()=>show(+b.dataset.i)));
    s.querySelector('.back').addEventListener('click',()=>home('back'));
    show(0);mount(s,dir||'fwd');
  }

  /* ---- WhatsApp : renseignements + réservation par sous-bloc ---------------
     Numéro pris dans data.js (D.whatsapp), format international sans + ni espaces.
     Si absent, les boutons ne s'affichent pas.                                */
  const WA_NUM=String(D.whatsapp||'').replace(/[^0-9]/g,'');
  const WA_SKIP=['bienvenue','urgence'];   // blocs sans boutons (ni résa ni renseignements)
  const WA_ICON='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.86 9.86 0 0 0 4.79 1.22h.01c5.46 0 9.9-4.45 9.91-9.91a9.85 9.85 0 0 0-2.91-7.02zM12.04 20.13a8.2 8.2 0 0 1-4.18-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.18 8.18 0 0 1-1.26-4.38c0-4.54 3.7-8.23 8.24-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.82c0 4.54-3.69 8.23-8.24 8.23zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.12-.17.25-.64.81-.79.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.16-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.42-.14 0-.31-.02-.47-.02-.17 0-.43.06-.66.31-.23.25-.86.85-.86 2.07 0 1.22.89 2.4 1.01 2.56.12.17 1.75 2.67 4.23 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.11-.22-.17-.47-.29z"/></svg>';
  function waOpen(text){ window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(text),'_blank','noopener'); }
  function waActions(catId){ return (WA_NUM && WA_SKIP.indexOf(catId)<0)?`<div class="d-actions">
      <button class="wa-btn" data-wa="info" type="button">${WA_ICON}<span>Renseignements</span></button>
      <button class="wa-btn book" data-wa="book" type="button">${WA_ICON}<span>Réserver</span></button></div>`:''; }
  function waBind(box,it){ box.querySelectorAll('[data-wa]').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.wa==='info') waOpen(`Bonjour, je souhaite des informations sur « ${it.name} ».`);
      else waBookOpen(it);
    })); }
  let waItem=null;
  const waModal=document.createElement('div'); waModal.className='wa-modal';
  waModal.innerHTML=`<div class="wa-box"><h4>Réservation</h4><div class="wa-item" id="waName"></div>
    <div class="wa-field"><label>Nombre de personnes</label><input id="waPax" type="number" min="1" value="2"></div>
    <div class="wa-row"><div class="wa-field"><label>Date</label><input id="waDate" type="date"></div>
      <div class="wa-field"><label>Heure</label><input id="waTime" type="time"></div></div>
    <div class="wa-acts"><button class="wa-cancel" type="button" id="waCancel">Annuler</button>
      <button class="wa-send" type="button" id="waSend">${WA_ICON}<span>Envoyer</span></button></div></div>`;
  document.body.appendChild(waModal);
  function waBookOpen(it){ waItem=it; waModal.querySelector('#waName').textContent=it.name;
    const d=waModal.querySelector('#waDate'); if(!d.value) d.value=new Date().toISOString().slice(0,10);
    waModal.classList.add('open'); }
  function waClose(){ waModal.classList.remove('open'); }
  waModal.querySelector('#waCancel').addEventListener('click',waClose);
  waModal.addEventListener('click',e=>{ if(e.target===waModal) waClose(); });
  waModal.querySelector('#waSend').addEventListener('click',()=>{
    const pax=waModal.querySelector('#waPax').value||'?';
    const date=waModal.querySelector('#waDate').value||'?';
    const time=waModal.querySelector('#waTime').value||'?';
    waClose();
    waOpen(`Bonjour, je souhaite réserver « ${waItem.name} » pour ${pax} personne(s) le ${date} à ${time}.`);
  });

  document.getElementById('brand').addEventListener('click',()=>home('back'));
  document.addEventListener('keydown',e=>{ if(e.key!=='Escape')return;
    if(waModal.classList.contains('open')){ waClose(); return; }
    if(!stage.querySelector('.home')) home('back'); });
  /* attend les URLs de la base (si configurée) avant le 1er rendu, puis affiche */
  if(window.PHOTO_DB_READY&&typeof window.PHOTO_DB_READY.then==='function'){
    window.PHOTO_DB_READY.then(()=>home('fwd'),()=>home('fwd'));
  } else { home('fwd'); }
})();
</script>
</body>
</html>
